<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OIKOS</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="net">

  <canvas id="netCanvas"></canvas>

  <!-- CENTRO -->
  <main class="center">
    <div class="hero">
      <img
        src="assets/img/oikos-raposa.png"
        alt=""
        class="hero-bg"
        draggable="false"
      />
      <h1 class="oikos">OIKOS</h1>
    </div>
  </main>

  <!-- LOGIN -->
  <aside class="corner">
    <form id="loginForm" class="corner-card" autocomplete="off">
      <input
        id="senha"
        type="password"
        placeholder="chave"
        autocomplete="off"
        spellcheck="false"
        aria-label="Chave de acesso"
      />
      <button type="submit" aria-label="Entrar">↵</button>
    </form>
    <div id="loginMsg" class="corner-msg" aria-live="polite"></div>
  </aside>

  <!-- 🔥 ORDEM CORRETA DOS SCRIPTS -->
  <script src="assets/js/keys.js"></script>
  <script type="module" src="assets/js/app.js"></script>

</body>
</html>
